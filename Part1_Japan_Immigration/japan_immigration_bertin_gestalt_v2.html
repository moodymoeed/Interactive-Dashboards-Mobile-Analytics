*{box-sizing:border-box;margin:0;padding:0}
.dash{padding:1.25rem 1rem 1.5rem;font-family:var(--font-sans)}
.card-title{font-size:10px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.line-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 18px;margin-bottom:1.5rem}
.yr-group{background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:14px 16px}

#yr-badge{font-size:14px;font-weight:500;color:var(--color-text-primary);min-width:36px;text-align:right}
.stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:14px}
.stat{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:8px 12px;border:0.5px solid var(--color-border-tertiary)}
.stat-lbl{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.stat-val{font-size:17px;font-weight:500;color:var(--color-text-primary)}
.charts-row{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(0,1fr);gap:12px}
.sub-card{background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:12px 14px;border:0.5px solid var(--color-border-tertiary)}
.bar-legend{display:flex;flex-wrap:wrap;gap:4px 10px;margin-bottom:7px}
.bar-legend span{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--color-text-secondary)}
.ldot{width:7px;height:7px;border-radius:2px;flex-shrink:0}
</style>

const vLinePlugin={
  id:'vline',
  afterDraw(chart,_,opts){
    if(opts.x==null)return;
    const{ctx,chartArea,scales}=chart;
    const xPx=scales.x.getPixelForValue(opts.x);
    ctx.save();
    ctx.strokeStyle='rgba(220,38,38,0.6)';
    ctx.lineWidth=1.2;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(xPx,chartArea.top);
    ctx.lineTo(xPx,chartArea.bottom);
    ctx.stroke();
    ctx.restore();
  }
};
Chart.register(vLinePlugin);

  data:{

    datasets:[{data:DATA.map(d=>d.t),borderColor:'#2563EB',borderWidth:2,fill:false,pointRadius:0,pointHoverRadius:0,tension:0.35}]
  },
  options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{
      legend:{display:false},
      tooltip:{mode:'index',intersect:false,callbacks:{label:c=>' '+c.raw.toLocaleString()+' arrivals'}},
      vline:{x:2000}
    },
    scales:{
      x:{ticks:{color:TICK,font:{size:10},maxTicksLimit:12},grid:{display:false},border:{display:false}},
      y:{ticks:{color:TICK,font:{size:10},callback:v=>fmt(v)},grid:{color:'rgba(255,255,255,0.06)'},border:{display:false}}
    }
  }
});

const barChart=new Chart(document.getElementById('cBar'),{
  type:'bar',
  data:{labels:[],datasets:[{data:[],backgroundColor:[],borderRadius:3,borderSkipped:false}]},
  options:{
    indexAxis:'y',responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},datalabels:{display:false},tooltip:{callbacks:{label:c=>' '+c.raw.toLocaleString()}}},
    scales:{
      x:{ticks:{color:TICK,font:{size:10},callback:v=>fmt(v)},grid:{display:false},border:{display:false}},
      y:{ticks:{color:TICK,font:{size:10.5}},grid:{display:false},border:{display:false}}
    }
  }
});

const pieChart=new Chart(document.getElementById('cPie'),{
  type:'doughnut',
  data:{labels:CONT_LABELS,datasets:[{data:[],backgroundColor:CONT_COLORS,borderWidth:2,borderColor:'rgba(255,255,255,0.15)'}]},
  options:{
    responsive:true,maintainAspectRatio:false,
    cutout:'38%',
    layout:{padding:30},
    plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label:c=>{const t=c.dataset.data.reduce((a,b)=>a+b,0);return' '+c.raw.toLocaleString()+' ('+(c.raw/t*100).toFixed(1)+'%)'}}},
      datalabels:{
        display:ctx=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return ctx.dataset.data[ctx.dataIndex]/t*100>=3.5;},
        color:'#fff',
        font:{size:10,weight:'500'},
        textAlign:'center',
        formatter:(val,ctx)=>{const t=ctx.dataset.data.reduce((a,b)=>a+b,0);return CONT_LABELS[ctx.dataIndex]+'\n'+(val/t*100).toFixed(0)+'%';},
        anchor:'center',align:'center'
      }
    }
  }
});

function buildBarLegend(row){
  const seen=new Set();
  row.k.forEach(([n])=>{const ci=CC[n]??-1;if(ci>=0)seen.add(ci);});
  document.getElementById('bar-legend').innerHTML=[...seen].sort((a,b)=>a-b).map(ci=>
    `<span><span class="ldot" style="background:${CONT_COLORS[ci]}"></span>${CONT_LABELS[ci]}</span>`
  ).join('');
}

function updateCharts(yr){
  const row=getRow(yr);
  document.getElementById('yr-badge').textContent=yr;
  document.getElementById('bar-yr').textContent=yr;
  document.getElementById('pie-yr').textContent=yr;
  document.getElementById('s-total').textContent=row.t.toLocaleString();
  const mi=row.c.indexOf(Math.max(...row.c));
  document.getElementById('s-region').textContent=CONT_LABELS[mi];
  document.getElementById('s-top').textContent=row.k[0][0];
  barChart.data.labels=row.k.map(k=>k[0]);
  barChart.data.datasets[0].data=row.k.map(k=>k[1]);
  barChart.data.datasets[0].backgroundColor=row.k.map(([n])=>{const ci=CC[n]??-1;return ci>=0?CONT_COLORS[ci]:'#888';});
  barChart.update('none');
  pieChart.data.datasets[0].data=row.c;
  pieChart.update('none');
  lineChart.options.plugins.vline.x=yr;
  lineChart.update('none');
  buildBarLegend(row);
}

document.getElementById('yr-slider').addEventListener('input',e=>updateCharts(parseInt(e.target.value)));
updateCharts(2000);
</script>
